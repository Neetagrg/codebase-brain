name: Codebase Brain Workflow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Check AGENTS.md exists
      run: |
        if [ -f "bob-copilot/AGENTS.md" ]; then
          echo "✅ AGENTS.md found"
          wc -l bob-copilot/AGENTS.md
        else
          echo "❌ AGENTS.md missing"
          exit 1
        fi

    - name: Check slash commands exist
      run: |
        for cmd in debug-joint lua-trace sdf-check gait-plan; do
          if [ -f "bob-copilot/commands/${cmd}.md" ]; then
            echo "✅ ${cmd}.md found"
          else
            echo "❌ ${cmd}.md missing"
            exit 1
          fi
        done

    - name: Check domain skill exists
      run: |
        if [ -f "bob-copilot/skills/arduhumanoid-expert.md" ]; then
          echo "✅ Domain skill found"
        else
          echo "❌ Domain skill missing"
          exit 1
        fi

    - name: Check bob sessions exist
      run: |
        count=$(ls bob-sessions/*.json 2>/dev/null | wc -l)
        echo "✅ Found ${count} Bob session exports"

    - name: Summary
      run: echo "✅ All Codebase Brain artifacts validated successfully"
